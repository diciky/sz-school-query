        - generic [ref=e65]:
          - paragraph [ref=e66]: 深圳市2025年高中阶段学校招生第一批划线工作顺利结束，第一批投档录取工作将在今日完成。7月27日16:00起，考生可登录深圳招考网招考服务栏目（网址：https://szeb.sz.gov.cn/szzkw/zkfw/index.html）查询录取结果。
          - paragraph [ref=e67]:
            - strong [ref=e68]: 投档录取规则
          - paragraph [ref=e69]: 深圳市中考招生投档原则是“分数优先、依照志愿顺序”，在中考总分相同的情况下，进行“同分比较”优先投档，比较顺序如下：
          - paragraph [ref=e70]: （1）生物与地理（合卷）分数高的优先；
          - paragraph [ref=e71]: （2）语、数、英三科总分高的优先。
          - paragraph [ref=e72]: 省一级学校所录取的考生综合素质评价结果须为“达标”，省一级公办普高所录取的考生语文、数学、英语、物理与化学、历史与道法单科等级须在C+以上（含C+），体育单科等级为C以上（含C）。
          - paragraph [ref=e73]: 如考生选择“接受走读调剂”且被录取为走读生，不得在录取后要求转为该校的住宿生，或者以无法住校为由要求退档转录其他学校。
          - paragraph [ref=e74]:
            - strong [ref=e75]: 中考
            - strong [ref=e76]: 录取工作日程安排
          - paragraph [ref=e77]: 第一批招生学校：7月27日录取；
          - paragraph [ref=e78]: 第二批招生学校：7月28日录取；
          - paragraph [ref=e79]: 第三批招生学校（部、省属及跨市中职类学校）：7月30-31日填报志愿，8月上旬由广东省教育考试院组织录取。
          - paragraph [ref=e80]: 录取通知书将于每批录取工作结束后一周内由招生学校寄发给考生本人。如不按录取学校规定的时间报到注册，将被视为自愿放弃入学资格。
          - paragraph [ref=e81]:
            - strong [ref=e82]: 阳光招生，接受社会监督
          - paragraph [ref=e83]: 市教育局将持续落实“阳光招生”政策，严肃查处招生违规行为，确保录取公平公正。社会各界可通过招生咨询投诉电话（82181999）监督反馈，市教育局将对举报情况第一时间核查处理。
          - paragraph [ref=e84]:
            - strong [ref=e85]: 温馨提醒：
            - text: 请考生、家长通过深圳市教育局、深圳市招生考试办公室的官方网站和微信公众号了解招生录取信息，不要轻信各类所谓升学、招生咨询的网站、公众号、QQ群、微信群等，以免受骗上当，影响升学或带来经济财产损失。
